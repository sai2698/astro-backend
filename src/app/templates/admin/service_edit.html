{% extends "base.html" %}

{% block header %}Edit Service: {{ service.name }}{% endblock %}

{% block content %}
<div class="mb-6 flex justify-between items-center">
    <a href="/admin/services" class="text-indigo-600 hover:text-indigo-800 font-medium flex items-center">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Services
    </a>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden mb-8 max-w-4xl">
    <div class="px-6 py-4 border-b border-gray-100 bg-gray-50">
        <h3 class="text-lg font-semibold text-gray-800">Edit Service Details</h3>
    </div>
    <div class="p-6">
        <form action="/admin/services/edit/{{ service.id }}" method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="md:col-span-2">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="name">Service Name</label>
                    <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500" id="name" name="name" type="text" value="{{ service.name }}" required>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="description">Description (Optional)</label>
                    <textarea class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 h-32" id="description" name="description">{{ service.description }}</textarea>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="duration_minutes">Duration (Minutes)</label>
                    <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500" id="duration_minutes" name="duration_minutes" type="number" value="{{ service.duration_minutes }}" required>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="base_price">Base Price ($)</label>
                    <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500" id="base_price" name="base_price" type="number" step="0.01" value="{{ service.base_price }}" required>
                </div>
            </div>
            
            <div class="flex justify-end border-t pt-4">
                <a href="/admin/services" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-bold py-2 px-6 rounded shadow-sm focus:outline-none transition duration-150 mr-4">
                    Cancel
                </a>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded shadow-sm focus:outline-none transition duration-150">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
